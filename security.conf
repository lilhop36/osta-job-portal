# OSTA Job Portal — Apache Security Configuration
# Include this in your VirtualHost or .htaccess

# ---- Security Headers ----
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS
</IfModule>

# ---- Prevent directory listing ----
Options -Indexes

# ---- Block access to sensitive files ----
<FilesMatch "(\.env|\.git|composer\.(json|lock)|phpunit\.xml|\.htaccess|deploy\.bat)$">
    Require all denied
</FilesMatch>

# ---- Block access to hidden files ----
<FilesMatch "^\.">
    Require all denied
</FilesMatch>

# ---- Protect uploads directory ----
<Directory "uploads">
    Options -Indexes -ExecCGI
    <FilesMatch "\.(php|phtml|php5|pl|py|cgi|sh|asp)$">
        Require all denied
    </FilesMatch>
</Directory>

# ---- Block common attack patterns ----
<IfModule mod_rewrite.c>
    RewriteEngine On
    
    # Block SQL injection attempts
    RewriteCond %{QUERY_STRING} (\%27)|(\')|(\-\-)|(\%23)|(#) [OR]
    RewriteCond %{QUERY_STRING} (/|%2f)(.*)(/|%2f) [OR]
    RewriteCond %{QUERY_STRING} union.*select [NC,OR]
    RewriteCond %{QUERY_STRING} concat.*\(.*\) [NC]
    RewriteRule .* - [F,L]
    
    # Block file inclusion attempts
    RewriteCond %{QUERY_STRING} (\.\.\/|\.\.\\) [OR]
    RewriteCond %{QUERY_STRING} (ftp|https?): [NC]
    RewriteRule .* - [F,L]
    
    # Block common exploit scanners
    RewriteCond %{HTTP_USER_AGENT} (havij|nikto|dirbuster|masscan|nmap) [NC]
    RewriteRule .* - [F,L]
</IfModule>

# ---- Rate limiting (requires mod_ratelimit) ----
<IfModule mod_ratelimit.c>
    <Location "/api/">
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 10
    </Location>
</IfModule>

# ---- PHP Security Settings ----
<IfModule mod_php.c>
    php_flag display_errors off
    php_flag expose_php off
    php_flag log_errors on
    php_value error_log logs/php_error.log
    php_flag session.cookie_httponly on
    php_flag session.cookie_secure On
    php_flag session.use_strict_mode on
    php_value session.gc_maxlifetime 1440
</IfModule>
